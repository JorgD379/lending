    /* Industries page — enhanced cards */
    .ind-card {
      background: var(--s1);
      padding: 28px 24px;
      cursor: pointer;

      display: flex;

      min-height: 160px;
      text-decoration: none;
      color: inherit;

    .ind-title {
      font-family: var(--fh);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      flex: 1;
      color: var(--text);
    }

    .ind-card:hover .ind-link { color: var(--text); }
