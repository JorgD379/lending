  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Industries page — enhanced cards */
    .ind-card {
      background: var(--s1);
      padding: 28px 24px;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 160px;
      text-decoration: none;
      color: inherit;
    }
    .ind-card:hover { background: var(--s2); }
    .ind-card-top { display: flex; align-items: center; justify-content: space-between; }
    .ind-num { font-family: var(--fm); font-size: 10px; color: var(--m); }
    .ind-icon { color: var(--m); transition: color .15s; flex-shrink: 0; }
    .ind-card:hover .ind-icon { color: var(--text); }
    .ind-title {
      font-family: var(--fh);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      flex: 1;
      color: var(--text);
    }
    .ind-link { font-family: var(--fm); font-size: 10px; color: var(--m); letter-spacing: 0.06em; margin-top: auto; transition: color .15s; }
    .ind-card:hover .ind-link { color: var(--text); }
    .ind-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px; margin-top: 48px; }
    @media(max-width:900px){ .ind-grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:540px){ .ind-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<div id="nav-root"></div>
